{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h1 class="title">
        Signup
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Signup
        </button>

    </form>

    <div class="auth-link">

        <p>

            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </p>

    </div>

</div>

{% endblock %}
