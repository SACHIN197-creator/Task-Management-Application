{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h1 class="title">
        Login
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Login
        </button>

    </form>

    <div class="auth-link">

        <p>
            Don't have an account?

            <a href="{% url 'signup' %}">
                Signup
            </a>
        </p>

    </div>

</div>

{% endblock %}
