{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Task Manager</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<nav>

    <div class="logo">
        Task Manager
    </div>

    <div class="nav-links">

        {% if user.is_authenticated %}

            <a href="{% url 'dashboard' %}">
                Dashboard
            </a>

            <a href="{% url 'create_task' %}">
                Create Task
            </a>

            <a href="{% url 'logout' %}">
                Logout
            </a>

        {% else %}

            <a href="{% url 'login' %}">
                Login
            </a>

            <a href="{% url 'signup' %}">
                Signup
            </a>

        {% endif %}

    </div>

</nav>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
